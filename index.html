<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnitrix Footprint Charts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light-theme">
    <div class="toolbar-top">
        <div class="toolbar-section">
            <div class="symbol-search">
                <div class="icon-search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18"><path fill="currentColor" d="M12.5 11h-.79l-.28-.27A6.471 6.471 0 0 0 13 6.5 6.5 6.5 0 1 0 6.5 13c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L17.49 16l-4.99-5zm-6 0C4.01 11 2 8.99 2 6.5S4.01 2 6.5 2 11 4.01 11 6.5 8.99 11 6.5 11z"/></svg>
                </div>
                <select id="symbol-select">
                    <option value="">Waiting for data...</option>
                </select>
            </div>
            <div class="divider"></div>
            <div class="timeframe-selector">
                <select id="timeframe-select">
                    <option value="1">1m</option>
                    <option value="5">5m</option>
                    <option value="15">15m</option>
                    <option value="30">30m</option>
                    <option value="60">1h</option>
                </select>
            </div>
            <div class="divider"></div>
            <div class="mode-selector" id="mode-selector">
                <div class="mode-btn active" data-mode="footprint">Footprint</div>
                <div class="mode-btn" data-mode="vp-fixed">VP Fixed</div>
                <div class="mode-btn" data-mode="vp-anchored">VP Anchored</div>
                <div class="mode-btn" data-mode="heatmap">Heatmap</div>
                <div class="mode-btn" data-mode="cluster">Cluster</div>
            </div>
        </div>
        <div class="toolbar-section">
            <div class="theme-toggle" id="theme-toggle" title="Toggle Dark/Light Mode">
                <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </div>
            <div class="divider"></div>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>
    </div>
    <div class="main-content">
        <div class="sidebar-left">
            <div class="tool-btn active" title="Cursor"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg></div>
            <div class="tool-btn" title="Trend Line"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"/></svg></div>
            <div class="tool-btn" title="Horizontal Ray"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        </div>
        <div class="chart-container">
            <canvas id="footprint-canvas"></canvas>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
